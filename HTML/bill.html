<!-- Similar structure as home page -->
<!-- Form for adding/editing billing and shipping addresses -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Your E-Commerce - Address</title>
</head>
<body>
    <header>
        <!-- Header content -->
    </header>
    <main>
        <section>
            <h2>Billing and Shipping Address</h2>
            <!-- Address form -->
            <form id="addressForm">
                <!-- Form fields go here -->
                <label for="billingAddress">Billing Address:</label>
                <textarea id="billingAddress" name="billingAddress" rows="4" cols="50"></textarea>

                <label for="shippingAddress">Shipping Address:</label>
                <textarea id="shippingAddress" name="shippingAddress" rows="4" cols="50"></textarea>

                <button type="submit">Save Address</button>
            </form>
        </section>
    </main>
    <footer>
        <!-- Footer content -->
    </footer>
    <script src="../JS/script.js"></script>
</body>
</html>
