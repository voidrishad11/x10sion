<!-- Similar structure as home page -->
<!-- Display added products, total, checkout button, etc. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Your E-Commerce - Cart</title>
</head>
<body>
    <header>
        <!-- Header content -->
    </header>
    <main>
        <section>
            <h2>Shopping Cart</h2>
            <!-- Cart items -->
            <div class="cart-item">
                <h3>Product 1</h3>
                <p>Price: $50.00</p>
                <button onclick="removeFromCart(1)">Remove</button>
            </div>

            <div class="cart-item">
                <h3>Product 2</h3>
                <p>Price: $75.00</p>
                <button onclick="removeFromCart(2)">Remove</button>
            </div>

            <!-- Add more cart items here -->

            <!-- Total and Checkout button -->
            <p>Total: $125.00</p>
            <button onclick="checkout()">Checkout</button>
        </section>
    </main>
    <footer>
        <!-- Footer content -->
    </footer>
    <script src="../JS/script.js"></script>
</body>
</html>
