<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <title>Your E-Commerce - Profile</title>
</head>
<body>
    <header>
        <!-- Header content -->
    </header>
    <main>
        <section>
            <h2>User Profile</h2>
            <!-- Login form -->
            <form id="loginForm">
                <!-- Form fields go here -->
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">

                <label for="password">Password:</label>
                <input type="password" id="password" name="password">

                <button type="submit">Login</button>
            </form>

            <!-- Order history -->
            <h3>Order History</h3>
            <ul>
                <li>Order #123 - Total: $50.00</li>
                <li>Order #456 - Total: $75.00</li>
                <!-- Add more order history items here -->
            </ul>

            <!-- Address book -->
            <h3>Address Book</h3>
            <ul>
                <li>Billing Address: 123 Main St, Cityville</li>
                <li>Shipping Address: 456 Oak St, Townsville</li>
                <!-- Add more address book items here -->
            </ul>
        </section>
    </main>
    <footer>
        <!-- Footer content -->
    </footer>
    <script src="../JS/script.js"></script>
</body>
</html>
