<!-- Similar structure as home page -->
<!-- Return instructions, form, etc. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Your E-Commerce - Return</title>
</head>
<body>
    <header>
        <!-- Header content -->
    </header>
    <main>
        <section>
            <h2>Return a Product</h2>
            <!-- Return instructions and form -->
            <p>Follow the instructions below to return a product:</p>
            <ol>
                <li>Fill out the return form.</li>
                <li>Package the product securely.</li>
                <li>Ship the package to the provided address.</li>
            </ol>
            <form id="returnForm">
                <!-- Form fields go here -->
                <label for="orderNumber">Order Number:</label>
                <input type="text" id="orderNumber" name="orderNumber">

                <label for="reason">Reason for Return:</label>
                <textarea id="reason" name="reason" rows="4" cols="50"></textarea>

                <button type="submit">Submit Return</button>
            </form>
        </section>
    </main>
    <footer>
        <!-- Footer content -->
    </footer>
    <script src="../JS/script.js"></script>
</body>
</html>
